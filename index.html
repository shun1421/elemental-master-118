<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素学習ポータル - Element Games</title>
    <style>
        :root {
            --primary-color: #58cc02;
            --secondary-color: #1899d6;
            --text-color: #4b4b4b;
            --bg-color: #f7f7f7;
            --btn-border: #e5e5e5;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 30px;
            color: #777;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .game-card {
            background: white;
            border: 2px solid var(--btn-border);
            border-bottom: 5px solid var(--btn-border);
            border-radius: 16px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-card:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        .game-card h2 {
            margin: 10px 0;
            font-size: 22px;
        }

        .game-card p {
            font-size: 14px;
            margin: 0;
        }

        /* ゲームごとのイメージカラー */
        .card-match { border-color: var(--primary-color); }
        .card-match h2 { color: var(--primary-color); }
        
        .card-pos { border-color: var(--secondary-color); }
        .card-pos h2 { color: var(--secondary-color); }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>元素学習ポータル</h1>
        <p>遊びたいゲームを選択してください。</p>

        <div class="menu-grid">
            <a href="match.html" class="game-card card-match">
                <div class="icon">🧪</div>
                <h2>元素マッチング</h2>
                <p>記号と名前を素早く一致させよう！</p>
            </a>

            <a href="position.html" class="game-card card-pos">
                <div class="icon">🗺️</div>
                <h2>ポジションマスター</h2>
                <p>周期表の正しい位置を当てよう！</p>
            </a>
        </div>
    </div>

</body>
</html>
