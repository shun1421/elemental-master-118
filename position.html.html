<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポジションマスター - Periodic Explorer Pro</title>
    <style>
        :root {
            --primary-color: #58cc02;
            --secondary-color: #1899d6;
            --error-color: #ff4b4b;
            --text-color: #4b4b4b;
            --bg-color: #f7f7f7;
            --cell-size: 38px;
            --cell-gap: 3px;
            --label-color: #999;
            --btn-border: #e5e5e5;
        }

        body {
            font-family: 'Helvetica Neue'， Arial， sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #home-screen， #game-screen， #result-screen {
            display: none;
            width: 100%;
            max-width: 950px;
            padding: 20px;
            text-align: center;
        }

        #home-screen { display: block; }

        .periodic-wrapper {
            display: inline-grid;
            grid-template-columns: 30px repeat(18, var(--cell-size));
            grid-template-rows: 30px repeat(7, var(--cell-size)) 15px repeat(2, var(--cell-size));
            gap: var(--cell-gap);
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 20px auto;
            overflow-x: auto;
        }

        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--label-color);
            font-weight: bold;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .cell.empty { background: transparent; border: none; }
        .cell.spacer { grid-column: 1 / 20; background: transparent; border: none; }

        .cell.target {
            border: 2px solid #333;
            animation: blink 0.8s infinite;
            z-index: 10;
        }

        @keyframes blink {
            0%， 100% { background: #fff; }
            50% { background: #ffeb3b; }
        }

        .cell.correct-fill { background: var(--primary-color); color: white; border: none; font-size: 14px; }

        .choices-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            background: white;
            border: 2px solid var(--btn-border);
            border-bottom: 4px solid var(--btn-border);
            border-radius: 12px;
            padding: 12px 20px;
            margin: 10px auto;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.1s;
            width: 80%;
            display: block;
            text-decoration: none;
            color: var(--text-color);
            outline: none;
        }

        .btn:active { transform: translateY(2px); border-bottom-width: 2px; }

        h1 { color: var(--secondary-color); }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>ポジションマスター</h1>
        <p>周期表の光った場所に入る元素を当てよう！（10問）</p>
        <button class="btn" onclick="startGame(1)">Lv.1：基本20元素</button>
        <button class="btn" onclick="startGame(2)">Lv.2：受験頻出</button>
        <button class="btn" onclick="startGame(3)">Lv.3：全118元素</button>
        
        <button class="btn" onclick="location.href='index.html'" style="border-color: #ccc; margin-top: 30px;">ポータルに戻る</button>
    </div>

    <div id="game-screen">
        <h2 id="question-counter">第 1 / 10 問</h2>
        <div class="periodic-wrapper" id="table-grid"></div>
        <div class="choices-container" id="choices"></div>
    </div>

    <div id="result-screen">
        <h2>リザルト</h2>
        <div class="periodic-wrapper" id="result-table-grid"></div>
        <p id="final-stats" style="font-size: 20px; font-weight: bold;"></p>
        
        <button class="btn" onclick="location.reload()" style="background: var(--primary-color); color: white; border:none;">もう一度遊ぶ</button>
        <button class="btn" onclick="location.href='index.html'">ポータルに戻る</button>
    </div>

    <script>
        // 全118元素データ（match.htmlと同じ構造で管理）
        const elements = [
            {n:1,s:"H",m:"水素",l:1,c:1,r:1},{n:2,s:"He",m:"ヘリウム",l:1,c:18,r:1},
            {n:3,s:"Li",m:"リチウム",l:1,c:1,r:2},{n:4,s:"Be",m:"ベリリウム",l:1,c:2,r:2},{n:5,s:"B",m:"ホウ素",l:1,c:13,r:2},{n:6,s:"C",m:"炭素",l:1,c:14,r:2},{n:7,s:"N",m:"窒素",l:1,c:15,r:2},{n:8,s:"O",m:"酸素",l:1,c:16,r:2},{n:9,s:"F",m:"フッ素",l:1,c:17,r:2},{n:10,s:"Ne",m:"ネオン",l:1,c:18,r:2},
            {n:11,s:"Na",m:"ナトリウム",l:1,c:1,r:3},{n:12,s:"Mg",m:"マグネシウム",l:1,c:2,r:3},{n:13,s:"Al",m:"アルミニウム",l:1,c:13,r:3},{n:14,s:"Si",m:"ケイ素",l:1,c:14,r:3},{n:15,s:"P",m:"リン",l:1,c:15,r:3},{n:16,s:"S",m:"硫黄",l:1,c:16,r:3},{n:17,s:"Cl",m:"塩素",l:1,c:17,r:3},{n:18,s:"Ar",m:"アルゴン",l:1,c:18,r:3},
            {n:19,s:"K",m:"カリウム",l:1,c:1,r:4},{n:20,s:"Ca",m:"カルシウム",l:1,c:2,r:4},
            // 受験頻出 (Lv2)
            {n:25,s:"Mn",m:"マンガン",l:2,c:7,r:4},{n:26,s:"Fe",m:"鉄",l:2,c:8,r:4},{n:29,s:"Cu",m:"銅",l:2,c:11,r:4},{n:30,s:"Zn",m:"亜鉛",l:2,c:12,r:4},{n:35,s:"Br",m:"臭素",l:2,c:17,r:4},{n:47,s:"Ag",m:"銀",l:2,c:11,r:5},{n:53,s:"I",m:"ヨウ素",l:2,c:17,r:5},{n:56,s:"Ba",m:"バリウム",l:2,c:2,r:6},{n:80,s:"Hg",m:"水銀",l:2,c:12,r:6},{n:82,s:"Pb",m:"鉛",l:2,c:14,r:6},
            // 全118元素 (Lv3) 抜粋（実際には全座標を記載）
            {n:57,s:"La",m:"ランタン",l:3,c:4,r:9},{n:89,s:"Ac",m:"アクチニウム",l:3,c:4,r:10},{n:118,s:"Og",m:"オガネソン",l:3,c:18,r:7}
        ];

        let currentPool = [];
        let questionIndex = 0;
        let correctCount = 0;
        let targetEl = null;
        let solvedElements = [];

        function startGame(level) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            currentPool = elements.filter(el => el.l <= level);
            createTableStructure('table-grid');
            questionIndex = 0;
            correctCount = 0;
            solvedElements = [];
            nextQuestion();
        }

        function createTableStructure(containerId) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = '';
            grid.appendChild(createDiv('label'， ''));
            for (let c = 1; c <= 18; c++) grid.appendChild(createDiv('label'， c));

            for (let r = 1; r <= 7; r++) {
                grid.appendChild(createDiv('label'， r));
                for (let c = 1; c <= 18; c++) grid.appendChild(createCell(containerId， c， r));
            }
            grid.appendChild(createDiv('cell spacer'， ''));
            const labels = ["*"， "**"];
            for (let r = 9; r <= 10; r++) {
                grid.appendChild(createDiv('label'， labels[r-9]));
                for (let c = 1; c <= 3; c++) grid.appendChild(createDiv('cell empty'， ''));
                for (let c = 4; c <= 18; c++) grid.appendChild(createCell(containerId， c， r));
            }
        }

        function createCell(containerId， c， r) {
            const elAt = elements.find(e => e.c === c && e.r === r);
            const cell = document.createElement('div');
            cell.id = `${containerId}-${c}-${r}`;
            cell.className = elAt ? 'cell' : 'cell empty';
            return cell;
        }

        function createDiv(className， text) {
            const div = document.createElement('div');
            div.className = className;
            div.textContent = text;
            return div;
        }

        function nextQuestion() {
            questionIndex++;
            if (questionIndex > 10) return showResult();
            document.getElementById('question-counter').textContent = `第 ${questionIndex} / 10 問`;
            targetEl = currentPool[Math.floor(Math.random() * currentPool.length)];
            
            document.querySelectorAll('.cell').forEach(c => {
                if(!c.classList.contains('empty') && !c.classList.contains('spacer')) {
                    c.className = 'cell'; c.textContent = '';
                }
            });

            const targetCell = document.getElementById(`table-grid-${targetEl.c}-${targetEl.r}`);
            if(targetCell) targetCell.classList.add('target');
            renderChoices();
        }

        function renderChoices() {
            const container = document.getElementById('choices');
            container.innerHTML = '';
            let choices = [targetEl];
            while(choices.length < 4) {
                let r = currentPool[Math.floor(Math.random() * currentPool.length)];
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => 0.5 - Math.random()).forEach(el => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.style.width = 'auto';
                b.style.minWidth = '80px';
                b.textContent = el.s;
                b.onclick = () => checkAnswer(el， b);
                container.appendChild(b);
            });
        }

        function checkAnswer(selected， btn) {
            document.querySelectorAll('#choices .btn').forEach(b => b.style.pointerEvents = 'none');
            if (selected.n === targetEl.n) {
                btn.style.background = 'var(--primary-color)';
                btn.style.color = 'white';
                correctCount++;
                solvedElements.push(targetEl);
            } else {
                btn.style.background = 'var(--error-color)';
                btn.style.color = 'white';
            }
            const cell = document.getElementById(`table-grid-${targetEl.c}-${targetEl.r}`);
            if(cell) {
                cell.textContent = targetEl.s;
                cell.classList.remove('target');
                cell.classList.add('correct-fill');
            }
            setTimeout(nextQuestion， 1500);
        }

        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            createTableStructure('result-table-grid');
            solvedElements.forEach(el => {
                const cell = document.getElementById(`result-table-grid-${el.c}-${el.r}`);
                if(cell) {
                    cell.textContent = el.s;
                    cell.classList.add('correct-fill');
                }
            });
            document.getElementById('final-stats').textContent = `10問中 ${correctCount} 問正解！`;
        }
    </script>
</body>
</html>
